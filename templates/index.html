<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Student Score Predictor</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Background animation */

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Card */

.card {

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);

    padding: 40px;
    border-radius: 20px;

    width: 400px;

    text-align: center;

    box-shadow: 0 10px 30px rgba(0,0,0,0.3);

    animation: fadeIn 1s ease;
}

@keyframes fadeIn {

    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Title */

.title {
    font-size: 28px;
    color: white;
    margin-bottom: 10px;
}

.subtitle {
    color: #ddd;
    font-size: 14px;
    margin-bottom: 30px;
}

/* Input */

input {

    width: 100%;
    padding: 12px;

    border-radius: 10px;
    border: none;

    font-size: 16px;

    outline: none;

    margin-bottom: 20px;
}

/* Button */

button {

    width: 100%;
    padding: 12px;

    border: none;
    border-radius: 10px;

    font-size: 16px;

    background: #00ffd5;
    color: black;

    cursor: pointer;

    transition: 0.3s;
}

button:hover {

    transform: scale(1.05);
    background: #00c9a7;
}

/* Result box */

.result {

    margin-top: 25px;

    padding: 15px;

    border-radius: 10px;

    background: rgba(0,255,213,0.2);

    color: white;

    animation: pop 0.5s ease;
}

@keyframes pop {

    from {
        transform: scale(0.8);
        opacity: 0;
    }

    to {
        transform: scale(1);
        opacity: 1;
    }
}

/* Loader */

.loader {

    display: none;

    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;

    border-radius: 50%;

    width: 30px;
    height: 30px;

    animation: spin 1s linear infinite;

    margin: auto;
}

@keyframes spin {

    0% {transform: rotate(0deg);}
    100% {transform: rotate(360deg);}
}

.footer {

    margin-top: 20px;
    color: #ccc;
    font-size: 12px;
}

</style>

</head>

<body>

<div class="card">

<div class="title">
AI Score Predictor
</div>

<div class="subtitle">
Machine Learning Powered Prediction System
</div>

<form method="POST" onsubmit="showLoader()">

<input
type="number"
step="0.1"
name="hours"
placeholder="Enter study hours"
required>

<button type="submit">
Predict Score
</button>

</form>

<div class="loader" id="loader"></div>

{% if result is not none %}

<div class="result">

Study Hours: <b>{{hours}}</b><br><br>

Predicted Score:<br>

<h2>{{result}}</h2>

</div>

{% endif %}

<div class="footer">
Powered by Machine Learning • Flask • Scikit-Learn
</div>

</div>

<script>

function showLoader(){

document.getElementById("loader").style.display = "block";

}

</script>

</body>
</html>
